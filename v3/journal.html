<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Research Journal · Alexey Mikhail Johll</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300;1,9..40,400&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#f7f5f0;--bg-deep:#edeae3;--surface:#ffffff;--border:#d4cfc5;--border-light:#e8e4dc;--text-primary:#1a1a18;--text-secondary:#6b6560;--text-tertiary:#9a9490;--accent:#2d5a3d;--accent-light:#3d7a52;--accent-subtle:rgba(45,90,61,0.08);--accent-border:rgba(45,90,61,0.2);--danger:#c0392b}
[data-theme="dark"]{--bg:#111111;--bg-deep:#0c0c0c;--surface:#1a1a1a;--border:rgba(61,207,176,0.12);--border-light:rgba(61,207,176,0.06);--text-primary:#e8e8e8;--text-secondary:#999;--text-tertiary:#666;--accent:#3dcfb0;--accent-light:#6eddc5;--accent-subtle:rgba(61,207,176,0.08);--accent-border:rgba(61,207,176,0.2);--danger:#e24b4a}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text-primary);font-family:'DM Sans',system-ui,sans-serif;padding:2rem 1rem;line-height:1.65}
.wrap{max-width:820px;margin:0 auto}
.nav-back{display:inline-block;font-size:11px;color:var(--text-tertiary);font-family:'JetBrains Mono',monospace;text-decoration:none;margin-bottom:2rem;border:1px solid var(--border-light);padding:5px 12px;border-radius:2px;transition:all .15s}
.nav-back:hover{color:var(--accent);border-color:var(--accent-border)}
h1{font-family:'Instrument Serif',serif;font-size:clamp(22px,4vw,30px);font-weight:400;margin-bottom:4px}
.sub{font-size:13px;color:var(--text-tertiary);font-family:'JetBrains Mono',monospace;margin-bottom:2rem}
.controls{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
button{background:var(--surface);border:1px solid var(--border);color:var(--text-primary);font-family:'JetBrains Mono',monospace;font-size:11px;padding:6px 14px;border-radius:2px;cursor:pointer;transition:all .15s}
button:hover{border-color:var(--accent);color:var(--accent)}
button.active{background:var(--accent-subtle);color:var(--accent);border-color:var(--accent-border)}
.filter-label{font-size:10px;color:var(--text-tertiary);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.5px}
.stats{display:flex;gap:16px;margin-bottom:20px;padding:14px;background:var(--surface);border:1px solid var(--border-light);border-radius:2px;flex-wrap:wrap}
.stat{text-align:center;min-width:80px}
.stat-num{font-size:22px;font-weight:300;color:var(--accent);font-family:'JetBrains Mono',monospace}
.stat-lbl{font-size:9px;color:var(--text-tertiary);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.5px}
.entry{background:var(--surface);border:1px solid var(--border-light);border-radius:2px;padding:14px 16px;margin-bottom:8px}
.entry-hdr{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap}
.entry-portal{font-size:9px;font-weight:500;font-family:'JetBrains Mono',monospace;padding:2px 8px;border-radius:2px;text-transform:uppercase;letter-spacing:.5px}
.entry-type{font-size:9px;font-family:'JetBrains Mono',monospace;padding:2px 6px;border-radius:2px;text-transform:uppercase;letter-spacing:.5px}
.entry-type.obs{background:var(--accent-subtle);color:var(--accent);border:1px solid var(--accent-border)}
.entry-type.quest{background:rgba(180,134,11,0.08);color:#b8860b;border:1px solid rgba(180,134,11,0.2)}
.entry-type.conc{background:rgba(74,90,159,0.08);color:#5d6db8;border:1px solid rgba(74,90,159,0.2)}
.entry-ts{font-size:9px;color:var(--text-tertiary);font-family:'JetBrains Mono',monospace;margin-left:auto}
.entry-text{font-size:13px;color:var(--text-primary);line-height:1.7}
.entry-ctx{font-size:10px;color:var(--text-tertiary);font-family:'JetBrains Mono',monospace;margin-top:6px;padding-top:6px;border-top:1px solid var(--border-light)}
.empty{padding:40px;text-align:center;font-size:14px;color:var(--text-tertiary);font-style:italic;background:var(--surface);border:1px solid var(--border-light);border-radius:2px}
.hyp-section{margin-bottom:20px}
.hyp-card{background:var(--surface);border:1px solid var(--accent-border);border-left:3px solid var(--accent);border-radius:0 2px 2px 0;padding:14px 16px;margin-bottom:8px}
.hyp-portal{font-size:10px;font-weight:500;color:var(--accent);font-family:'JetBrains Mono',monospace;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.hyp-text{font-size:13px;color:var(--text-primary);line-height:1.7;font-style:italic}
.hyp-ts{font-size:9px;color:var(--text-tertiary);font-family:'JetBrains Mono',monospace;margin-top:4px}
.theme-toggle{position:fixed;top:1.5rem;right:1.5rem;width:40px;height:40px;border-radius:50%;background:var(--surface);border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;transition:all 200ms;z-index:100}
.theme-toggle:hover{border-color:var(--accent)}
.theme-toggle svg{width:18px;height:18px;color:var(--text-secondary)}
.theme-toggle .icon-sun{display:none}
[data-theme="dark"] .theme-toggle .icon-moon{display:none}
[data-theme="dark"] .theme-toggle .icon-sun{display:block}
</style>
<script>(function(){var t=localStorage.getItem('alexey_theme')||'light';document.documentElement.setAttribute('data-theme',t)})()</script>
</head>
<body>
<script>function toggleTheme(){var h=document.documentElement,c=h.getAttribute('data-theme')||'light',n=c==='light'?'dark':'light';h.setAttribute('data-theme',n);localStorage.setItem('alexey_theme',n)}</script>
<button type="button" class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme"><svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg><svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg></button>

<div class="wrap">
<a href="index.html" class="nav-back">&larr; portfolio home</a>

<h1>Research Journal</h1>
<div class="sub">All hypotheses, observations, questions, and conclusions across every portal</div>

<div class="stats" id="stats"></div>

<div class="controls">
  <span class="filter-label">Filter by portal:</span>
  <button class="active" onclick="filterPortal('all',this)">All</button>
  <button onclick="filterPortal('football',this)">Football</button>
  <button onclick="filterPortal('kmc',this)">KMC</button>
  <button onclick="filterPortal('md',this)">MD</button>
  <button onclick="filterPortal('fractal',this)">Fractal</button>
  <button onclick="filterPortal('rw',this)">Random Walk</button>
</div>
<div class="controls">
  <span class="filter-label">Filter by type:</span>
  <button class="active" onclick="filterType('all',this)">All</button>
  <button onclick="filterType('hypothesis',this)">Hypotheses</button>
  <button onclick="filterType('obs',this)">Observations</button>
  <button onclick="filterType('quest',this)">Questions</button>
  <button onclick="filterType('conc',this)">Conclusions</button>
  <button style="margin-left:auto" onclick="exportAll()">Export all as markdown</button>
</div>

<div id="hypotheses"></div>
<div id="entries"></div>
</div>

<script>
var PORTALS = [
  { key: 'football', label: 'Football xG', color: '#3d7a52', logKey: 'football_logbook', hypKey: 'alexey_exp_01_hypothesis', hypTs: 'alexey_exp_01_timestamp' },
  { key: 'kmc', label: 'KMC', color: '#7a6a3d', logKey: 'kmc_logbook', hypKeys: ['alexey_kmc_inv1_hypothesis','alexey_kmc_inv2_hypothesis','alexey_kmc_inv3_hypothesis'], hypTsKeys: ['alexey_kmc_inv1_timestamp','alexey_kmc_inv2_timestamp','alexey_kmc_inv3_timestamp'] },
  { key: 'fractal', label: 'Fractal', color: '#3d7a7a', logKey: 'fractal_logbook' },
  { key: 'rw', label: 'Random Walk', color: '#5d6db8', logKey: 'rw_logbook', hypKey: 'rw_hypothesis', hypTs: 'rw_timestamp' }
];

var currentPortalFilter = 'all';
var currentTypeFilter = 'all';

function getAllEntries() {
  var entries = [];
  PORTALS.forEach(function(p) {
    // Logbook entries
    try {
      var raw = localStorage.getItem(p.logKey);
      if (raw) {
        var arr = JSON.parse(raw);
        arr.forEach(function(e) {
          entries.push({
            portal: p.key,
            portalLabel: p.label,
            portalColor: p.color,
            type: e.type || 'obs',
            text: e.text || e.entry || '',
            context: e.context || '',
            ts: e.ts || e.timestamp || ''
          });
        });
      }
    } catch(ex) {}
  });
  entries.sort(function(a,b) { return (b.ts || '').localeCompare(a.ts || ''); });
  return entries;
}

function getHypotheses() {
  var hyps = [];
  PORTALS.forEach(function(p) {
    if (p.hypKey) {
      var text = localStorage.getItem(p.hypKey);
      var ts = localStorage.getItem(p.hypTs);
      if (text) hyps.push({ portal: p.key, portalLabel: p.label, portalColor: p.color, text: text, ts: ts || '' });
    }
    if (p.hypKeys) {
      p.hypKeys.forEach(function(k, i) {
        var text = localStorage.getItem(k);
        var ts = localStorage.getItem(p.hypTsKeys[i]);
        if (text) hyps.push({ portal: p.key, portalLabel: p.label + ' Inv ' + (i+1), portalColor: p.color, text: text, ts: ts || '' });
      });
    }
  });
  hyps.sort(function(a,b) { return (b.ts || '').localeCompare(a.ts || ''); });
  return hyps;
}

function render() {
  var entries = getAllEntries();
  var hyps = getHypotheses();

  // Stats
  var statsEl = document.getElementById('stats');
  var totalEntries = entries.length;
  var totalHyps = hyps.length;
  var obs = entries.filter(function(e){return e.type==='obs'}).length;
  var quest = entries.filter(function(e){return e.type==='quest'}).length;
  var conc = entries.filter(function(e){return e.type==='conc'}).length;
  var portalsUsed = new Set();
  entries.forEach(function(e){portalsUsed.add(e.portal)});
  hyps.forEach(function(h){portalsUsed.add(h.portal)});

  statsEl.innerHTML = [
    '<div class="stat"><div class="stat-num">' + totalHyps + '</div><div class="stat-lbl">Hypotheses</div></div>',
    '<div class="stat"><div class="stat-num">' + totalEntries + '</div><div class="stat-lbl">Log Entries</div></div>',
    '<div class="stat"><div class="stat-num">' + obs + '</div><div class="stat-lbl">Observations</div></div>',
    '<div class="stat"><div class="stat-num">' + quest + '</div><div class="stat-lbl">Questions</div></div>',
    '<div class="stat"><div class="stat-num">' + conc + '</div><div class="stat-lbl">Conclusions</div></div>',
    '<div class="stat"><div class="stat-num">' + portalsUsed.size + '</div><div class="stat-lbl">Portals Used</div></div>'
  ].join('');

  // Hypotheses
  var hypEl = document.getElementById('hypotheses');
  var filteredHyps = hyps;
  if (currentPortalFilter !== 'all') filteredHyps = hyps.filter(function(h){return h.portal === currentPortalFilter});
  if (currentTypeFilter !== 'all' && currentTypeFilter !== 'hypothesis') filteredHyps = [];

  if (filteredHyps.length > 0 && (currentTypeFilter === 'all' || currentTypeFilter === 'hypothesis')) {
    hypEl.innerHTML = '<div style="font-size:11px;font-weight:500;color:var(--accent);font-family:\'JetBrains Mono\',monospace;letter-spacing:1px;text-transform:uppercase;margin-bottom:10px">Locked Hypotheses</div>' +
      filteredHyps.map(function(h) {
        return '<div class="hyp-card"><div class="hyp-portal" style="color:' + h.portalColor + '">' + h.portalLabel + '</div><div class="hyp-text">"' + h.text + '"</div>' + (h.ts ? '<div class="hyp-ts">locked ' + new Date(h.ts).toLocaleString() + '</div>' : '') + '</div>';
      }).join('');
  } else {
    hypEl.innerHTML = '';
  }

  // Entries
  var el = document.getElementById('entries');
  var filtered = entries;
  if (currentPortalFilter !== 'all') filtered = filtered.filter(function(e){return e.portal === currentPortalFilter});
  if (currentTypeFilter !== 'all' && currentTypeFilter !== 'hypothesis') filtered = filtered.filter(function(e){return e.type === currentTypeFilter});

  if (filtered.length === 0 && filteredHyps.length === 0) {
    el.innerHTML = '<div class="empty">No journal entries yet. Run experiments in the portals, write observations in their logbooks, and they will appear here automatically.</div>';
    return;
  }

  if (currentTypeFilter === 'hypothesis') { el.innerHTML = ''; return; }

  el.innerHTML = (filtered.length > 0 ? '<div style="font-size:11px;font-weight:500;color:var(--accent);font-family:\'JetBrains Mono\',monospace;letter-spacing:1px;text-transform:uppercase;margin:16px 0 10px">Log Entries</div>' : '') +
    filtered.map(function(e) {
      var typeClass = e.type === 'quest' ? 'quest' : (e.type === 'conc' ? 'conc' : 'obs');
      var typeLabel = e.type === 'quest' ? 'Question' : (e.type === 'conc' ? 'Conclusion' : 'Observation');
      return '<div class="entry"><div class="entry-hdr">' +
        '<span class="entry-portal" style="background:' + e.portalColor + '18;color:' + e.portalColor + ';border:1px solid ' + e.portalColor + '40">' + e.portalLabel + '</span>' +
        '<span class="entry-type ' + typeClass + '">' + typeLabel + '</span>' +
        (e.ts ? '<span class="entry-ts">' + new Date(e.ts).toLocaleString() + '</span>' : '') +
        '</div><div class="entry-text">' + e.text + '</div>' +
        (e.context ? '<div class="entry-ctx">' + e.context + '</div>' : '') +
        '</div>';
    }).join('');
}

function filterPortal(p, btn) {
  currentPortalFilter = p;
  var btns = btn.parentNode.querySelectorAll('button');
  for (var i = 0; i < btns.length; i++) btns[i].classList.remove('active');
  btn.classList.add('active');
  render();
}

function filterType(t, btn) {
  currentTypeFilter = t;
  var btns = btn.parentNode.querySelectorAll('button');
  for (var i = 0; i < btns.length; i++) btns[i].classList.remove('active');
  btn.classList.add('active');
  render();
}

function exportAll() {
  var hyps = getHypotheses();
  var entries = getAllEntries();
  var lines = ['# Alexey Mikhail Johll — Research Journal', '', '## Hypotheses', ''];
  hyps.forEach(function(h) {
    lines.push('### ' + h.portalLabel);
    lines.push('> ' + h.text);
    if (h.ts) lines.push('*Locked: ' + new Date(h.ts).toLocaleString() + '*');
    lines.push('');
  });
  lines.push('## Log Entries', '');
  entries.forEach(function(e) {
    var typeLabel = e.type === 'quest' ? 'Question' : (e.type === 'conc' ? 'Conclusion' : 'Observation');
    lines.push('### [' + e.portalLabel + '] ' + typeLabel);
    lines.push(e.text);
    if (e.context) lines.push('`' + e.context + '`');
    if (e.ts) lines.push('*' + new Date(e.ts).toLocaleString() + '*');
    lines.push('');
  });
  var blob = new Blob([lines.join('\n')], {type:'text/markdown'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'alexey-research-journal.md';
  a.click();
}

render();
</script>
</body>
</html>
