<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" fill="none">
  <!-- Breadboard background -->
  <rect x="20" y="20" width="360" height="210" rx="8" fill="#1c2128" stroke="#30363d"/>

  <!-- Arduino board -->
  <rect x="40" y="40" width="120" height="80" rx="4" fill="#161b22" stroke="#3fb950" stroke-width="0.5"/>
  <text x="55" y="65" font-family="JetBrains Mono, monospace" font-size="10" fill="#8b949e">Arduino</text>
  <text x="55" y="80" font-family="JetBrains Mono, monospace" font-size="8" fill="#58a6ff">UNO R3</text>

  <!-- Pin 13 -->
  <rect x="140" y="55" width="20" height="8" rx="1" fill="#161b22" stroke="#3fb950" stroke-width="0.5"/>
  <text x="145" y="52" font-family="JetBrains Mono, monospace" font-size="7" fill="#3fb950">13</text>

  <!-- GND Pin -->
  <rect x="140" y="75" width="20" height="8" rx="1" fill="#161b22" stroke="#8b949e" stroke-width="0.5"/>
  <text x="142" y="72" font-family="JetBrains Mono, monospace" font-size="7" fill="#8b949e">GND</text>

  <!-- Wire from pin 13 to resistor -->
  <line x1="160" y1="59" x2="220" y2="59" stroke="#58a6ff" stroke-width="2"/>

  <!-- Resistor -->
  <rect x="220" y="52" width="50" height="14" rx="3" fill="#2d333b" stroke="#f0883e" stroke-width="0.5"/>
  <text x="230" y="63" font-family="JetBrains Mono, monospace" font-size="8" fill="#f0883e">220Ω</text>

  <!-- Wire from resistor to LED -->
  <line x1="270" y1="59" x2="310" y2="59" stroke="#58a6ff" stroke-width="2"/>

  <!-- LED -->
  <circle cx="320" cy="59" r="12" fill="none" stroke="#3fb950" stroke-width="1.5"/>
  <polygon points="315,53 325,59 315,65" fill="#3fb950" opacity="0.3"/>
  <text x="308" y="82" font-family="JetBrains Mono, monospace" font-size="8" fill="#3fb950">LED</text>

  <!-- Wire from LED to GND -->
  <line x1="320" y1="71" x2="320" y2="150" stroke="#8b949e" stroke-width="2"/>
  <line x1="160" y1="79" x2="320" y2="150" stroke="#8b949e" stroke-width="2" stroke-dasharray="4,2"/>

  <!-- GND symbol -->
  <line x1="310" y1="150" x2="330" y2="150" stroke="#8b949e" stroke-width="2"/>
  <line x1="314" y1="155" x2="326" y2="155" stroke="#8b949e" stroke-width="1.5"/>
  <line x1="317" y1="160" x2="323" y2="160" stroke="#8b949e" stroke-width="1"/>

  <!-- Labels -->
  <text x="40" y="150" font-family="JetBrains Mono, monospace" font-size="9" fill="#8b949e">Circuit: Pin 13 → 220Ω → LED → GND</text>
  <text x="40" y="165" font-family="JetBrains Mono, monospace" font-size="8" fill="#58a6ff">The resistor limits current to protect the LED</text>
</svg>
