<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Research Logbook · Alexey Mikhail Johll</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300;1,9..40,400&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#f7f5f0;--bg-deep:#edeae3;--surface:#ffffff;--border:#d4cfc5;--border-light:#e8e4dc;--text-primary:#1a1a18;--text-secondary:#6b6560;--text-tertiary:#9a9490;--accent:#2d5a3d;--accent-light:#3d7a52;--accent-subtle:rgba(45,90,61,0.08);--accent-border:rgba(45,90,61,0.2);--danger:#c0392b}
[data-theme="dark"]{--bg:#0a0a0a;--bg-deep:#060606;--surface:#141414;--border:rgba(61,207,176,0.12);--border-light:rgba(61,207,176,0.06);--text-primary:#e8e8e8;--text-secondary:#8a8a8a;--text-tertiary:#5a5a5a;--accent:#3dcfb0;--accent-light:#6eddc5;--accent-subtle:rgba(61,207,176,0.08);--accent-border:rgba(61,207,176,0.2);--danger:#e24b4a}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text-primary);font-family:'DM Sans',system-ui,sans-serif;padding:2rem 1rem;line-height:1.65}
.wrap{max-width:1000px;margin:0 auto}
.nav-back{display:inline-block;font-size:11px;color:var(--text-tertiary);font-family:'JetBrains Mono',monospace;text-decoration:none;margin-bottom:1.5rem;border:1px solid var(--border-light);padding:5px 12px;border-radius:2px;transition:all .15s}
.nav-back:hover{color:var(--accent);border-color:var(--accent-border)}
.page-tag{display:inline-block;font-size:11px;font-weight:500;background:var(--accent-subtle);color:var(--accent-light);border:1px solid var(--accent-border);padding:3px 10px;border-radius:2px;margin-bottom:12px;font-family:'JetBrains Mono',monospace}
.page-title{font-size:clamp(1.75rem,4vw,2.5rem);font-family:'Instrument Serif',serif;font-weight:400;color:var(--text-primary);margin-bottom:6px;line-height:1.2}
.page-sub{font-size:14px;color:var(--text-secondary);line-height:1.7;max-width:750px;margin-bottom:2rem}

.filters{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:20px;padding:12px;background:var(--surface);border:1px solid var(--border);border-radius:2px}
.filters select,.filters input{background:var(--bg);border:1px solid var(--border);color:var(--text-primary);font-family:'JetBrains Mono',monospace;font-size:11px;padding:6px 10px;border-radius:2px}
.filters select{min-width:140px}
.filters input{flex:1;min-width:180px}
.filters select:focus,.filters input:focus{outline:none;border-color:var(--accent)}
.filter-label{font-size:9px;color:var(--text-tertiary);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.04em}

.stats-row{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.stat-chip{background:var(--surface);border:1px solid var(--border);border-radius:2px;padding:8px 14px;display:flex;align-items:center;gap:8px}
.stat-chip .num{font-size:20px;font-weight:500;color:var(--accent-light);font-family:'JetBrains Mono',monospace}
.stat-chip .lbl{font-size:10px;color:var(--text-secondary);font-family:'JetBrains Mono',monospace}

.date-group{margin-bottom:20px}
.date-hdr{font-size:11px;font-weight:500;color:var(--text-tertiary);font-family:'JetBrains Mono',monospace;letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--border-light)}

.entry{border:1px solid var(--border-light);border-radius:2px;padding:12px;margin-bottom:8px;background:var(--surface);transition:border-color .2s}
.entry:hover{border-color:var(--border)}
.entry-hdr{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap}
.module-badge{font-size:8px;font-weight:500;font-family:'JetBrains Mono',monospace;padding:2px 8px;border-radius:2px;text-transform:uppercase;letter-spacing:.04em}
.type-tag{font-size:8px;font-weight:500;font-family:'JetBrains Mono',monospace;padding:2px 6px;border-radius:2px;text-transform:uppercase;letter-spacing:.04em}
.type-tag.obs{background:rgba(60,80,160,0.08);color:#4a6a9a;border:1px solid rgba(60,80,160,0.2)}
.type-tag.quest{background:rgba(240,180,41,0.08);color:#b8860b;border:1px solid rgba(240,180,41,0.2)}
.type-tag.conc{background:var(--accent-subtle);color:var(--accent);border:1px solid var(--accent-border)}
.entry-ts{font-size:9px;color:var(--text-tertiary);font-family:'JetBrains Mono',monospace;margin-left:auto}
.entry-text{font-size:12px;color:var(--text-primary);line-height:1.6}
.entry-ctx{font-size:10px;color:var(--text-tertiary);margin-top:4px;font-style:italic}

.empty-state{text-align:center;padding:60px 20px;color:var(--text-tertiary)}
.empty-state .icon{font-size:48px;margin-bottom:16px;opacity:.3}
.empty-state .msg{font-size:14px;font-family:'JetBrains Mono',monospace;margin-bottom:8px}
.empty-state .hint{font-size:11px;line-height:1.6}

.export-bar{display:flex;gap:8px;margin-bottom:20px;justify-content:flex-end}
button{background:var(--surface);border:1px solid var(--border);color:var(--text-primary);font-family:'JetBrains Mono',monospace;font-size:11px;padding:7px 16px;border-radius:2px;cursor:pointer;transition:all .15s}
button:hover:not(:disabled){border-color:var(--accent);color:var(--accent)}
button.danger{color:var(--danger);border-color:rgba(192,57,43,0.3)}
button.danger:hover:not(:disabled){background:rgba(192,57,43,0.08)}

.theme-toggle{position:fixed;top:1.5rem;right:1.5rem;width:40px;height:40px;border-radius:50%;background:var(--surface);border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;transition:all 200ms;z-index:100}
.theme-toggle:hover{border-color:var(--accent)}
.theme-toggle svg{width:18px;height:18px;color:var(--text-secondary);transition:color 200ms}
.theme-toggle:hover svg{color:var(--accent)}
.theme-toggle .icon-sun{display:none}
[data-theme="dark"] .theme-toggle .icon-moon{display:none}
[data-theme="dark"] .theme-toggle .icon-sun{display:block}

@media print{
  body{background:#fff;color:#000;padding:1cm}
  .nav-back,.filters,.export-bar,.theme-toggle{display:none!important}
  .entry{border:1px solid #ccc;break-inside:avoid;background:#fff}
  .module-badge,.type-tag{border:1px solid #999}
  .entry-text{color:#000}
  .page-title{color:#000}
  .date-hdr{color:#666;border-bottom:1px solid #ccc}
}
@media(max-width:600px){.stats-row{flex-direction:column}.filters{flex-direction:column}}
</style>
<script>(function(){var t=localStorage.getItem('alexey_theme')||'light';document.documentElement.setAttribute('data-theme',t)})()</script>
</head>
<body>
<script>function toggleTheme(){var h=document.documentElement,c=h.getAttribute('data-theme')||'light',n=c==='light'?'dark':'light';h.setAttribute('data-theme',n);localStorage.setItem('alexey_theme',n)}</script>
<button type="button" class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
  <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
  <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
</button>
<div class="wrap">
<a href="index.html" class="nav-back">&larr; portfolio home</a>
<div class="page-tag">ALEXEY MIKHAIL JOHLL &middot; RESEARCH LOGBOOK</div>
<div class="page-title">Research Logbook</div>
<div class="page-sub">All observations, questions, and conclusions from your investigations across every module — collected in one place. This is the record of your scientific thinking.</div>

<div class="stats-row" id="statsRow"></div>

<div class="filters">
  <div>
    <div class="filter-label">Module</div>
    <select id="filterModule" onchange="renderAll()">
      <option value="all">All modules</option>
    </select>
  </div>
  <div>
    <div class="filter-label">Type</div>
    <select id="filterType" onchange="renderAll()">
      <option value="all">All types</option>
      <option value="obs">Observations</option>
      <option value="quest">Questions</option>
      <option value="conc">Conclusions</option>
    </select>
  </div>
  <div style="flex:1">
    <div class="filter-label">Search</div>
    <input type="text" id="filterSearch" placeholder="Search entries..." oninput="renderAll()">
  </div>
</div>

<div class="export-bar">
  <button onclick="exportAll()">&#8681; Export full logbook as markdown</button>
  <button onclick="window.print()">&#128424; Print</button>
</div>

<div id="timeline"></div>
</div>

<script>
const MODULE_KEYS = {
  'alexey_ising_logbook': {name:'Ising Model', color:'#dd7d7d', bg:'rgba(200,60,60,0.15)', border:'rgba(200,60,60,0.3)'},
  'alexey_percolation_logbook': {name:'Percolation', color:'#7ddd7d', bg:'rgba(60,200,60,0.15)', border:'rgba(60,200,60,0.3)'},
  'alexey_qmc_logbook': {name:'QMC', color:'#7da0dd', bg:'rgba(60,80,160,0.15)', border:'rgba(60,80,160,0.3)'},
  'alexey_kmc_logbook': {name:'KMC', color:'#7dd87d', bg:'rgba(60,160,60,0.15)', border:'rgba(60,160,60,0.3)'},
  'alexey_dla_logbook': {name:'DLA', color:'#7dddd8', bg:'rgba(60,200,200,0.15)', border:'rgba(60,200,200,0.3)'},
  'alexey_lbm_logbook': {name:'LBM', color:'#dda07d', bg:'rgba(200,120,60,0.15)', border:'rgba(200,120,60,0.3)'},
  'alexey_md_logbook': {name:'MD (Tersoff)', color:'#ddd07d', bg:'rgba(200,180,60,0.15)', border:'rgba(200,180,60,0.3)'},
  'alexey_arduino_logbook': {name:'Arduino', color:'#5dc0dd', bg:'rgba(40,160,200,0.15)', border:'rgba(40,160,200,0.3)'},
  'alexey_exp_01_logbook': {name:'Exp 01 · xG', color:'#a07ddd', bg:'rgba(120,60,200,0.15)', border:'rgba(120,60,200,0.3)'},
  'alexey_exp_02_logbook': {name:'Exp 02 · Orbits', color:'#dd7daa', bg:'rgba(200,60,130,0.15)', border:'rgba(200,60,130,0.3)'},
  'alexey_exp_03_logbook': {name:'Exp 03 · Chaos', color:'#7ddda0', bg:'rgba(60,200,120,0.15)', border:'rgba(60,200,120,0.3)'},
  'alexey_exp_04_logbook': {name:'Exp 04 · Fractal', color:'#dd7d7d', bg:'rgba(200,60,60,0.15)', border:'rgba(200,60,60,0.3)'},
  'alexey_exp_05_logbook': {name:'Exp 05 · Walk', color:'#7da0dd', bg:'rgba(60,80,160,0.15)', border:'rgba(60,80,160,0.3)'},
  'alexey_exp_06_logbook': {name:'Exp 06 · Pendulum', color:'#dda07d', bg:'rgba(200,120,60,0.15)', border:'rgba(200,120,60,0.3)'},
  'alexey_exp_07_logbook': {name:'Exp 07 · Stars', color:'#ddd07d', bg:'rgba(200,180,60,0.15)', border:'rgba(200,180,60,0.3)'}
};

function getAllEntries() {
  const all = [];
  for (const [key, meta] of Object.entries(MODULE_KEYS)) {
    try {
      const entries = JSON.parse(localStorage.getItem(key)) || [];
      entries.forEach(e => all.push({...e, moduleKey: key, module: meta}));
    } catch(e) {}
  }
  all.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
  return all;
}

function renderAll() {
  const all = getAllEntries();
  const moduleFilter = document.getElementById('filterModule').value;
  const typeFilter = document.getElementById('filterType').value;
  const search = document.getElementById('filterSearch').value.toLowerCase();

  const filtered = all.filter(e => {
    if (moduleFilter !== 'all' && e.moduleKey !== moduleFilter) return false;
    if (typeFilter !== 'all' && e.type !== typeFilter) return false;
    if (search && !e.text.toLowerCase().includes(search) && !(e.context || '').toLowerCase().includes(search)) return false;
    return true;
  });

  // Stats
  const stats = document.getElementById('statsRow');
  const modules = new Set(all.map(e => e.moduleKey));
  stats.innerHTML = `
    <div class="stat-chip"><span class="num">${all.length}</span><span class="lbl">total entries</span></div>
    <div class="stat-chip"><span class="num">${modules.size}</span><span class="lbl">active modules</span></div>
    <div class="stat-chip"><span class="num">${all.filter(e=>e.type==='obs').length}</span><span class="lbl">observations</span></div>
    <div class="stat-chip"><span class="num">${all.filter(e=>e.type==='quest').length}</span><span class="lbl">questions</span></div>
    <div class="stat-chip"><span class="num">${all.filter(e=>e.type==='conc').length}</span><span class="lbl">conclusions</span></div>
  `;

  // Populate module filter if needed
  const sel = document.getElementById('filterModule');
  if (sel.options.length <= 1) {
    for (const [key, meta] of Object.entries(MODULE_KEYS)) {
      const opt = document.createElement('option');
      opt.value = key;
      opt.textContent = meta.name;
      sel.appendChild(opt);
    }
  }

  const timeline = document.getElementById('timeline');
  if (filtered.length === 0) {
    timeline.innerHTML = `<div class="empty-state">
      <div class="icon">&#128221;</div>
      <div class="msg">${all.length === 0 ? 'No logbook entries yet' : 'No matching entries'}</div>
      <div class="hint">${all.length === 0 ? 'Open any research tool or experiment, run an investigation,<br>and save your observations to the logbook.' : 'Try adjusting your filters or search terms.'}</div>
    </div>`;
    return;
  }

  // Group by date
  const groups = {};
  filtered.forEach(e => {
    const d = new Date(e.timestamp).toLocaleDateString('en-US', {weekday:'long', year:'numeric', month:'long', day:'numeric'});
    if (!groups[d]) groups[d] = [];
    groups[d].push(e);
  });

  let html = '';
  for (const [date, entries] of Object.entries(groups)) {
    html += `<div class="date-group"><div class="date-hdr">${date}</div>`;
    entries.forEach(e => {
      const typeClass = e.type === 'obs' ? 'obs' : e.type === 'quest' ? 'quest' : 'conc';
      const typeLabel = e.type === 'obs' ? 'Observation' : e.type === 'quest' ? 'Question' : 'Conclusion';
      const time = new Date(e.timestamp).toLocaleTimeString();
      html += `<div class="entry">
        <div class="entry-hdr">
          <span class="module-badge" style="background:${e.module.bg};color:${e.module.color};border:0.5px solid ${e.module.border}">${e.module.name}</span>
          <span class="type-tag ${typeClass}">${typeLabel}</span>
          <span class="entry-ts">${time}</span>
        </div>
        <div class="entry-text">${e.text.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>
        ${e.context ? '<div class="entry-ctx">' + e.context.replace(/</g,'&lt;').replace(/>/g,'&gt;') + '</div>' : ''}
      </div>`;
    });
    html += '</div>';
  }
  timeline.innerHTML = html;
}

function exportAll() {
  const all = getAllEntries();
  if (all.length === 0) return;
  let md = '# Alexey Mikhail Johll — Research Logbook\n\nExported: ' + new Date().toLocaleString() + '\n\n---\n\n';
  const groups = {};
  all.forEach(e => {
    const d = new Date(e.timestamp).toLocaleDateString();
    if (!groups[d]) groups[d] = [];
    groups[d].push(e);
  });
  for (const [date, entries] of Object.entries(groups)) {
    md += `## ${date}\n\n`;
    entries.forEach(e => {
      const typeLabel = e.type === 'obs' ? 'Observation' : e.type === 'quest' ? 'Question' : 'Conclusion';
      const time = new Date(e.timestamp).toLocaleTimeString();
      md += `### [${e.module.name}] ${typeLabel} — ${time}\n\n`;
      md += e.text + '\n\n';
      if (e.context) md += `> ${e.context}\n\n`;
    });
    md += '---\n\n';
  }
  const blob = new Blob([md], {type:'text/markdown'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'alexey-research-logbook.md';
  a.click();
}

renderAll();
</script>
</body>
</html>
